function speak(text){
  var src=AUDIO_MAP[text];
  if(!src){
    var keys=Object.keys(AUDIO_MAP);
    for(var i=0;i<keys.length;i++){
      if(keys[i].toLowerCase()===text.toLowerCase()){src=AUDIO_MAP[keys[i]];break}
    }
  }
  if(!src){showToast("暂无此音频");return}
  var a=document.getElementById("player")||(function(){
    var el=document.createElement("audio");el.id="player";
    el.style.display="none";document.body.appendChild(el);return el;
  })();
  a.src=src;
  a.playbackRate=speechRate;
  a.play().catch(function(){showToast("点击页面解锁音频")});
}
if("speechSynthesis" in window){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices()}}

function startRecognition(cb){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast("浏览器不支持语音识别，请用Chrome打开localhost");return null}
  var r=new SR();r.lang="en-US";r.interimResults=false;r.maxAlternatives=1;
  r.continuous=false;
  var done=false;
  function finish(result){
    if(done)return;done=true;
    clearTimeout(timer);
    try{r.stop()}catch(e){}
    cb(result);
  }
  var timer=setTimeout(function(){
    finish("__timeout__");
  },8000);
  r.onresult=function(e){finish(e.results[0][0].transcript.trim())};
  r.onerror=function(e){if(e.error==="aborted"||e.error==="no-speech"){finish("__end__")}else{showToast("录音出错:"+e.error);finish(null)}};
  r.onend=function(){finish("__end__")};
  r.onnomatch=function(){showToast("没有识别到语音，请再试一次");finish(null)};
  try{r.start()}catch(e){clearTimeout(timer);showToast("语音识别启动失败");finish(null)};
  return r;
}

  var btn=document.getElementById("permBtn");
  btn.disabled=true;btn.textContent="⏳ 授权中...";

  if("speechSynthesis" in window){
    warmupAudio();
    document.getElementById("permSpeak").textContent="✅ 已就绪";
    document.getElementById("permSpeak").classList.remove("pending");
  }else{
    document.getElementById("permSpeak").textContent="❌ 不支持";
  }
  
  // Step 2: request microphone
  if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      stream.getTracks().forEach(function(t){t.stop()});
      micReady=true;
      document.getElementById("permRecord").textContent="✅ 已就绪";
      document.getElementById("permRecord").classList.remove("pending");
      finishPermission();
    }).catch(function(e){
      document.getElementById("permRecord").textContent="⚠️ 被拒绝";
      document.getElementById("permRecord").classList.remove("pending");
      finishPermission();
    });
  }else{
    document.getElementById("permRecord").textContent="❌ 不支持";
    finishPermission();
  }
}

    document.getElementById("permOverlay").style.display="none";
    // Warm up audio context on user click
    if("speechSynthesis" in window)warmupAudio();
  };
}

function switchTab(name){
  document.querySelectorAll(".section").forEach(function(s){s.classList.remove("active")});
  document.querySelectorAll("nav button").forEach(function(b){b.classList.remove("active")});
  document.getElementById("sec-"+name).classList.add("active");
  document.getElementById("tab-"+name).classList.add("active");
  if(name==="progress")renderProgress();
  if(name==="quiz")renderQuiz();
}

function renderLetters(){

  var g=document.getElementById("letterGrid");g.innerHTML="";
  LETTERS.forEach(function(l){
    var d=document.createElement("div");
    d.className="letter-card"+(progress.letters[l.upper]?" learned":"");
    d.innerHTML='<div class="big">'+l.upper+l.lower+'</div><div class="sound">'+l.sound+'</div>';
    d.title="点击听发音";
    d.onclick=function(){speak(l.upper);progress.letters[l.upper]=true;saveProgress(progress);d.classList.add("learned")};
    g.appendChild(d);
  });
}

function renderWords(){
  var c=document.getElementById("wordCategories");c.innerHTML="";
  WORD_CATEGORIES.forEach(function(cat){
    var t=document.createElement("div");t.className="category-title";t.textContent=cat.name;c.appendChild(t);
    var g=document.createElement("div");g.className="word-grid";
    cat.words.forEach(function(w){
      var d=document.createElement("div");d.className="word-card";
      d.innerHTML='<div class="emoji">'+w.emoji+'</div><div class="en">'+w.en+'</div><div class="cn">'+w.cn+'</div>';
      d.onclick=function(){speak(w.en);var k=w.en;if(!progress.words[k])progress.words[k]=0;progress.words[k]++;saveProgress(progress)};
      g.appendChild(d);
    });
    c.appendChild(g);
  });
}

function renderSentences(){
  var c=document.getElementById("sentenceList");c.innerHTML="";
  SENTENCES.forEach(function(s,i){
    var d=document.createElement("div");d.className="sentence-card";
    var done=progress.sentences[s.en]&&progress.sentences[s.en].done;
    d.innerHTML='<div class="s-text">'+s.en+'</div><div class="s-cn">'+s.cn+'</div>'+
      '<div class="s-actions">'+
      '<button class="btn-speak" data-idx="'+i+'">🔊 听发音</button>'+
      '<button class="btn-record" data-idx="'+i+'">🎤 跟读录音</button>'+
      '<button class="btn-done" data-idx="'+i+'">'+(done?'✅ 已掌握':'✅ 已学会')+'</button>'+
      '</div>';
    d.querySelector(".btn-speak").onclick=function(e){e.stopPropagation();speak(s.en)};
    d.querySelector(".btn-record").onclick=function(e){
      e.stopPropagation();var btn=this;
      if(btn.classList.contains("recording"))return;
      btn.classList.add("recording");btn.textContent="🎤 正在听...";
      startRecognition(function(result){
        btn.classList.remove("recording");btn.textContent="🎤 跟读录音";
        if(result==="__timeout__"){
          showToast("录音超时，请点击按钮重新尝试");
        }else if(result==="__end__"){
          showToast("录音结束，未检测到语音");
        }else if(result){
          showToast("你说的是: "+result);
          if(!progress.sentences[s.en])progress.sentences[s.en]={count:0,lastTry:""};
          progress.sentences[s.en].count++;progress.sentences[s.en].lastTry=result;saveProgress(progress);
        }
      });
    };
    d.querySelector(".btn-done").onclick=function(e){
      e.stopPropagation();
      if(!progress.sentences[s.en])progress.sentences[s.en]={count:0,lastTry:""};
      progress.sentences[s.en].count++;progress.sentences[s.en].done=true;saveProgress(progress);
      d.querySelector(".btn-done").textContent="✅ 已掌握";
      showToast("👍 真棒！已标记为学会");
    };
    c.appendChild(d);
  });
}

var quizState={current:0,score:0,answered:false};
function renderQuiz(){
  quizState={current:0,score:0,answered:false};renderQuizQ();
}
function renderQuizQ(){
  var a=document.getElementById("quizArea");
  var s=document.getElementById("quizScore");
  s.textContent=quizState.score+" / "+quizState.current;
  if(quizState.current>=QUIZ.length){
    var msg=quizState.score>=12?"太厉害了！英语小达人！":quizState.score>=8?"很不错，继续加油！":"还需要多练习哦！";
    a.innerHTML='<div class="quiz-card"><div class="q-prompt" style="font-size:24px;">🎉 测验完成！</div><div style="font-size:36px;color:#5b2d8e;margin:12px 0;">'+quizState.score+' / '+QUIZ.length+'</div><p style="color:#888;">'+msg+'</p></div>';
    s.textContent=quizState.score+" / "+QUIZ.length;
    if(quizState.score>progress.quizBest){progress.quizBest=quizState.score;saveProgress(progress)}
    return;
  }
  var q=QUIZ[quizState.current];quizState.answered=false;
  a.innerHTML='<div class="quiz-card"><div class="q-prompt">第'+(quizState.current+1)+'题：'+q.q+'</div><div class="q-options">'+
    q.opts.map(function(o,i){return '<button onclick="answerQuiz('+i+')">'+o+'</button>'}).join("")+'</div></div>';
}
function answerQuiz(idx){
  if(quizState.answered)return;
  var q=QUIZ[quizState.current];
  var btns=document.querySelectorAll(".q-options button");
  if(idx===q.ans){
    btns[idx].classList.add("correct");quizState.score++;quizState.answered=true;
    speak("答对了！");quizState.current++;setTimeout(renderQuizQ,1500);
  }else{
    btns[idx].classList.add("wrong");speak("再试一次！");
    setTimeout(function(){btns[idx].classList.remove("wrong")},800);
  }
}
function resetQuiz(){renderQuiz()}

function renderProgress(){
  progress=loadProgress();
  var a=document.getElementById("progressArea");
  var ll=Object.keys(progress.letters).length;
  var wp=Object.keys(progress.words).length;
  var sp=Object.keys(progress.sentences).filter(function(k){return progress.sentences[k].done}).length;
  a.innerHTML=
    '<div class="progress-box"><h3>🔤 字母学习</h3><div class="progress-bar-outer"><div class="progress-bar-inner" style="width:'+(ll/26*100)+'%"></div></div><div class="stat-row"><span>已学 '+ll+' 个</span><span>共 26 个</span></div></div>'+
    '<div class="progress-box"><h3>📖 单词练习</h3><div class="progress-bar-outer"><div class="progress-bar-inner" style="width:'+Math.min(wp/48*100,100)+'%"></div></div><div class="stat-row"><span>已练 '+wp+' 个</span><span>共 48 个</span></div></div>'+
    '<div class="progress-box"><h3>📝 句型掌握</h3><div class="progress-bar-outer"><div class="progress-bar-inner" style="width:'+(sp/20*100)+'%"></div></div><div class="stat-row"><span>已掌握 '+sp+' 句</span><span>共 20 句</span></div></div>'+
    '<div class="progress-box"><h3>🎯 测验最高分</h3><div style="font-size:32px;color:#5b2d8e;text-align:center;">'+progress.quizBest+' / '+QUIZ.length+'</div></div>';
}

function resetAll(){
  if(confirm("确定要清除全部学习记录吗？")){localStorage.removeItem(STORAGE_KEY);progress=loadProgress();renderLetters();renderWords();renderSentences();renderProgress();showToast("已清除")}
}

renderLetters();renderWords();renderSentences();
</script>
</body></html>
